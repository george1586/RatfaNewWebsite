    <rect x="180" y="142" width="20" height="20" rx="4"/><rect x="206" y="142" width="20" height="20" rx="4"/>
    <rect x="50" y="214" width="20" height="20" rx="4"/><rect x="76" y="214" width="20" height="20" rx="4"/><rect x="102" y="214" width="20" height="20" rx="4"/><rect x="128" y="214" width="20" height="20" rx="4"/><rect x="154" y="214" width="20" height="20" rx="4"/><rect x="180" y="214" width="20" height="20" rx="4"/><rect x="206" y="214" width="20" height="20" rx="4"/>
    <rect x="50" y="238" width="20" height="20" rx="4"/><rect x="76" y="238" width="20" height="20" rx="4"/><rect x="102" y="238" width="20" height="20" rx="4"/><rect x="128" y="238" width="20" height="20" rx="4"/><rect x="154" y="238" width="20" height="20" rx="4"/><rect x="180" y="238" width="20" height="20" rx="4"/><rect x="206" y="238" width="20" height="20" rx="4"/>
