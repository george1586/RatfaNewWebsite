<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <rect width="280" height="280" fill="#F8F7F5"/>
  <rect x="20" y="20" width="240" height="240" rx="20" fill="white" stroke="rgba(0,0,0,0.06)"/>

  <text x="36" y="50" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="2" fill="rgba(26,26,26,0.5)">THIS WEEK</text>
  <text x="36" y="76" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="700" fill="#1A1A1A">Bedtime mode</text>

  <!-- Day labels -->
  <g font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="rgba(26,26,26,0.52)">
    <text x="60" y="106" text-anchor="middle">M</text>
    <text x="86" y="106" text-anchor="middle">T</text>
    <text x="112" y="106" text-anchor="middle">W</text>
    <text x="138" y="106" text-anchor="middle">T</text>
    <text x="164" y="106" text-anchor="middle">F</text>
    <text x="190" y="106" text-anchor="middle">S</text>
    <text x="216" y="106" text-anchor="middle">S</text>
  </g>

  <!-- Time labels -->
  <g font-family="Inter,system-ui,sans-serif" font-size="8" fill="rgba(26,26,26,0.4)">
