    <rect x="50" y="142" width="20" height="20" rx="4"/><rect x="76" y="142" width="20" height="20" rx="4"/><rect x="102" y="142" width="20" height="20" rx="4"/><rect x="128" y="142" width="20" height="20" rx="4"/><rect x="154" y="142" width="20" height="20" rx="4"/>
    <rect x="50" y="166" width="20" height="20" rx="4"/><rect x="76" y="166" width="20" height="20" rx="4"/><rect x="102" y="166" width="20" height="20" rx="4"/><rect x="128" y="166" width="20" height="20" rx="4"/><rect x="154" y="166" width="20" height="20" rx="4"/><rect x="180" y="166" width="20" height="20" rx="4"/><rect x="206" y="166" width="20" height="20" rx="4"/>
